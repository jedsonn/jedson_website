document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lmet>\n<div style=\"font-family:'Source Sans 3',-apple-system,sans-serif;background:#fafaf8;color:#2c2a25;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;\">\n\n  <nav style=\"position:sticky;top:0;z-index:100;background:rgba(250,250,248,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e8e6e1;\">\n    <div style=\"max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.5rem;\">\n      <a href=\"https://www.jedsonpinto.com/home\" style=\"font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:.95rem;color:#2c2a25;text-decoration:none;\">Jedson Pinto<\u002Fa>\n      <div style=\"display:flex;gap:1.3rem;\">\n        <a href=\"https://www.jedsonpinto.com/home\" style=\"font-size:.78rem;font-weight:500;color:#2c2a25;text-decoration:none;letter-spacing:.02em;border-bottom:1.5px solid #1a5276;padding:.15rem 0;\">Home<\u002Fa>\n        <a href=\"https://www.jedsonpinto.com/cv\" style=\"font-size:.78rem;font-weight:500;color:#6b6860;text-decoration:none;letter-spacing:.02em;padding:.15rem 0;\">CV<\u002Fa>\n        <a href=\"https://www.jedsonpinto.com/presentations-service\" style=\"font-size:.78rem;font-weight:500;color:#6b6860;text-decoration:none;letter-spacing:.02em;padding:.15rem 0;\">Talks &amp; Service<\u002Fa>\n        <a href=\"https://www.jedsonpinto.com/useful-links\" style=\"font-size:.78rem;font-weight:500;color:#6b6860;text-decoration:none;letter-spacing:.02em;padding:.15rem 0;\">Links<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <div style=\"max-width:820px;margin:0 auto;padding:0 1.5rem;\">\n\n    <div style=\"padding:2.5rem 0 1.8rem;border-bottom:1px solid #e8e6e1;\">\n      <div style=\"text-align:center;margin-bottom:1.7rem;\">\n        <h1 style=\"font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:2.1rem;line-height:1.12;color:#2c2a25;margin-bottom:.3rem;\">Jedson Pinto<\u002Fh1>\n        <div style=\"font-size:.92rem;color:#6b6860;margin-bottom:1rem;\">Assistant Professor of Accounting · <a href=\"https://jindal.utdallas.edu/faculty/jedson-pinto/\" style=\"color:#1a5276;text-decoration:none;border-bottom:1px dotted #1a5276;\">UT Dallas<\u002Fa><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center;\">\n          <a href=\"https://www.jedsonpinto.com/cv\" style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;text-decoration:none;background:#1a5276;color:#fff;border:1px solid #1a5276;\">CV<\u002Fa>\n          <a href=\"https://scholar.google.com/citations?user=fZJ0RxsAAAAJ&amp;hl=en&amp;oi=ao\" style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;text-decoration:none;border:1px solid #e8e6e1;color:#6b6860;background:#fff;\">Scholar<\u002Fa>\n          <a href=\"https://twitter.com/jedsonpinto\" style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;text-decoration:none;border:1px solid #e8e6e1;color:#6b6860;background:#fff;\">Twitter<\u002Fa>\n          <a href=\"https://www.jedsonpinto.com/presentations-service\" style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;text-decoration:none;border:1px solid #e8e6e1;color:#6b6860;background:#fff;\">Talks &amp; Service<\u002Fa>\n          <a href=\"https://www.jedsonpinto.com/useful-links\" style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.32rem .75rem;border-radius:20px;text-decoration:none;border:1px solid #e8e6e1;color:#6b6860;background:#fff;\">Links<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:1.9rem;align-items:start;\">\n        <div style=\"width:200px;height:250px;border-radius:6px;border:1px solid #e8e6e1;box-shadow:0 1px 3px rgba(0,0,0,.04);background-image:repeating-linear-gradient(135deg,#f0eeea 0 10px,#f6f5f2 10px 20px);display:flex;align-items:center;justify-content:center;text-align:center;padding:1rem;\" data-comment-anchor=\"d632864a9e-div\">\n          <span style=\"font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.66rem;color:#9a958c;line-height:1.5;\">headshot.jpg<br>(drop your photo here)<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:.87rem;color:#2c2a25;line-height:1.65;text-align:left;\" data-comment-anchor=\"f22445a34c-div\">\n          <p style=\"margin-bottom:.85rem;\">Hi! Welcome to my website. I'm an Assistant Professor of Accounting at the University of Texas at Dallas, where I've been since 2020. This summer I'm visiting <a href=\"https://www.bradescoasset.com.br/\" style=\"color:#1a5276;text-decoration:none;border-bottom:1px dotted #c5c2bb;\">Bradesco Asset Management<\u002Fa> as their AI Research Fellow, helping develop applied AI tools.<\u002Fp>\n          <p style=\"margin-bottom:.85rem;\">My research examines how information is produced, regulated, and consumed in financial markets — and increasingly, how new technologies like large language models are reshaping those processes.<\u002Fp>\n          <p style=\"margin-bottom:.85rem;\">I teach Fundamentals of Accounting Analytics; previously, Financial Accounting and Analysis and Introductory Management Accounting. I'm a CPA (Brazil, inactive). I co-founded the <a href=\"https://jindal.utdallas.edu/faculty/jedson-pinto/\" style=\"color:#1a5276;text-decoration:none;border-bottom:1px dotted #c5c2bb;\">AI Accounting Lab<\u002Fa> at UTD, and outside UTD I organize the BRA (Brazilian Accounting) Workshops.<\u002Fp>\n          <p style=\"margin-bottom:0;\">Before UTD, I held research and teaching positions at UNC Chapel Hill and FUCAPE Business School (Brazil). I review for leading accounting and finance journals. Besides research and teaching, I enjoy spending time with family and being outdoors.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:.7rem 0;font-size:.76rem;color:#9a958c;border-bottom:1px solid #e8e6e1;\">\n      <strong style=\"color:#6b6860;font-weight:600;\">Research:<\u002Fstrong> Disclosure &amp; Information Production · Capital Markets · ML/AI &nbsp;|&nbsp;\n      <strong style=\"color:#6b6860;font-weight:600;\">Teaching:<\u002Fstrong> Accounting Analytics · Previously Financial &amp; Managerial Accounting &nbsp;|&nbsp;\n      <strong style=\"color:#6b6860;font-weight:600;\">Nationality:<\u002Fstrong> Brazilian · U.S. Permanent Resident\n    <\u002Fdiv>\n\n    <div style=\"padding:.7rem .85rem;margin-top:.7rem;background:linear-gradient(135deg,#f8f6f2,#f3f1ed);border:1px solid #e8e6e1;border-radius:5px;border-left:3px solid #1a5276;display:flex;flex-wrap:wrap;gap:.3rem .6rem;align-items:baseline;\" data-comment-anchor=\"7fc8844085-div\">\n      <span style=\"font-family:'Source Serif 4',Georgia,serif;font-size:.81rem;font-style:italic;color:#6b6860;\">\"One child, one teacher, one book, and one pen can change the world.\"<\u002Fspan>\n      <span style=\"font-size:.78rem;color:#6b6860;\">If you are a student from Latin America considering a PhD, please reach out — and see <a href=\"https://www.bridgephd.com/home\" style=\"color:#1a5276;text-decoration:none;font-weight:600;border-bottom:1px dotted #1a5276;\">BridgePHD<\u002Fa> for resources.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"padding:1.6rem 0 .5rem;\">\n      <div style=\"font-family:'Source Serif 4',Georgia,serif;font-size:.94rem;line-height:1.62;color:#6b6860;margin-bottom:1.1rem;\">\n        My research asks how the\n        <span onclick=\"{{ fbDisc }}\" style=\"color:#1a5276;font-weight:600;cursor:pointer;border-bottom:1px dotted #1a5276;opacity:{{ dimDisc }};\">production and regulation of information<\u002Fspan>\n        affects\n        <span onclick=\"{{ fbMkt }}\" style=\"color:#1a5276;font-weight:600;cursor:pointer;border-bottom:1px dotted #1a5276;opacity:{{ dimMkt }};\">prices, investors, and intermediaries<\u002Fspan>\n        — using tools from\n        <span onclick=\"{{ fbML }}\" style=\"color:#1a5276;font-weight:600;cursor:pointer;border-bottom:1px dotted #1a5276;opacity:{{ dimML }};\">NLP and AI<\u002Fspan>\n        to study questions traditional methods miss.\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;align-items:center;\">\n        <button onclick=\"{{ expandAll }}\" style=\"font-family:'Source Sans 3',sans-serif;font-size:.7rem;font-weight:500;background:#fff;border:1px solid #e8e6e1;color:#6b6860;padding:.22rem .65rem;border-radius:20px;cursor:pointer;\">Expand all<\u002Fbutton>\n        <button onclick=\"{{ collapseAll }}\" style=\"font-family:'Source Sans 3',sans-serif;font-size:.7rem;font-weight:500;background:#fff;border:1px solid #e8e6e1;color:#6b6860;padding:.22rem .65rem;border-radius:20px;cursor:pointer;\">Collapse all<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:.32rem;margin-bottom:.55rem;align-items:center;\">\n        <span style=\"font-size:.66rem;font-weight:600;color:#9a958c;letter-spacing:.05em;text-transform:uppercase;margin-right:.2rem;\">Themes<\u002Fspan>\n        <sc-for list=\"{{ themes }}\" as=\"t\" hint-placeholder-count=\"3\"><span onclick=\"{{ t.onClick }}\" style=\"font-size:.68rem;font-weight:500;padding:.16rem .55rem;border-radius:20px;cursor:pointer;user-select:none;background:{{ t.bg }};color:{{ t.color }};border:1px solid {{ t.border }};\">{{ t.label }}<sc-if value=\"{{ t.showCount }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:.58rem;opacity:.65;margin-left:.18rem;\">{{ t.count }}<\u002Fspan><\u002Fsc-if><\u002Fspan><\u002Fsc-for>\n        <sc-if value=\"{{ filterActive }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ clearF 700;color:#2c2a25;margin:1.1rem 0 .4rem;padding-bottom:.25rem;border-bottom:1.5px solid #e8e6e1;display:flex;align-items:center;gap:.4rem;\">\n          <span style=\"font-size:.68rem;opacity:.5;color:#9a958c;\">○<\u002Fspan> Other Publications\n        <\u002Fdiv>\n        <sc-for list=\"{{ otherView }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #e8e6e1;border-radius:5px;margin-bottom:.4rem;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:.5rem .85rem;\">\n            <sc-if value=\"{{ o.hasUrl }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:.86rem;color:#2c2a25;line-height:1.35;\"><a href=\"{{ o.url }}\" target=\"_blank\" rel=\"noopener\" style=\"color:#2c2a25;text-decoration:none;border-bottom:1px dotted #c5c2bb;\">{{ o.title }}<\u002Fa><\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ o.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:.86rem;color:#2c2a25;line-height:1.35;\">{{ o.title }}<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ o.authorsShow }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:.76rem;color:#6b6860;margin-top:.08rem;\">with <sc-for list=\"{{ o.authors }}\" as=\"a\" hint-placeholder-count=\"2\"><sc-if value=\"{{ a.hasUrl }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ a.url }}\" target=\"_blank\" rel=\"noopener\" style=\"color:#6b6860;text-decoration:none;border-bottom:1px dotted #c5c2bb;\">{{ a.name }}<\u002Fa><\u002Fsc-if><sc-if value=\"{{ a.noUrl }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ a.name }}<\u002Fspan><\u002Fsc-if><sup style=\"font-size:.62em;color:#9a958c;font-weight:600;\">{{ a.mark }}<\u002Fsup>{{ a.sep }}<\u002Fsc-for><\u002Fdiv><\u002Fsc-if>\n            <div style=\"font-size:.74rem;font-weight:500;color:#2e7d32;margin-top:.1rem;\">{{ o.journal }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n\n      <div style=\"margin-top:1.3rem;padding-top:.7rem;border-top:1px solid #e8e6e1;font-size:.66rem;color:#9a958c;line-height:1.7;\">\n        <div><sup style=\"font-weight:600;\">*<\u002Fsup> corresponding author &nbsp;·&nbsp; <sup style=\"font-weight:600;\">+<\u002Fsup> coauthor was untenured faculty at project start &nbsp;·&nbsp; <sup style=\"font-weight:600;\">++<\u002Fsup> coauthor was a PhD student at project start<\u002Fdiv>\n        <div><strong style=\"font-weight:600;\">FT50<\u002Fstrong> Financial Times 50 list &nbsp;·&nbsp; <strong style=\"font-weight:600;\">UTD24<\u002Fstrong> UT Dallas Top-24 research list &nbsp;·&nbsp; <strong style=\"font-weight:600;\">FT50<sup>#<\u002Fsup><\u002Fstrong> former FT50 journal<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer style=\"border-top:1px solid #e8e6e1;margin-top:1.6rem;padding:1.1rem 0;font-size:.72rem;color:#9a958c;text-align:center;\">\n    <div style=\"max-width:820px;margin:0 auto;padding:0 1.5rem;\">\n      <a href=\"https://jindal.utdallas.edu/faculty/jedson-pinto/\" style=\"color:#6b6860;text-decoration:none;\">Naveen Jindal School of Management<\u002Fa> · University of Texas at Dallas\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showWorkInProcess&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;startExpanded&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showFilterCounts&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { activeTag: null, open: {}, collapsed: { wp:false, wip:false, pub:false }, inited:false };\n\n  wp = [\n    { title:\"AI Adoption and the Loss of Learning\",\n      coauthors:[{name:\"Suresh Radhakrishnan\",url:\"https://jindal.utdallas.edu/faculty/suresh-radhakrishnan/\"},{name:\"Josiah Weber\",url:\"https://www.linkedin.com/in/josiahcweber/\",mark:\"++\"}],\n      tldr:\"How adopting AI tools reshapes skill development and on-the-job learning.\",\n      tags:[\"ML/AI & Text\",\"Disclosure & Information Production\"] },\n    { title:\"Toxic Social Media Opinions and Capital Markets\", url:\"http://ssrn.com/abstract=4692457\",\n      coauthors:[{name:\"Elizabeth Blankespoor\",url:\"https://foster.uw.edu/faculty-research/directory/elizabeth-blankespoor/\"},{name:\"Kirti Sinha\",url:\"https://kirtisinha.com/\",mark:\"+\"}],\n      tldr:\"Using AI, the first paper to study hate speech in capital markets.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\",\"ML/AI & Text\"] }\n  ];\n\n  wip = [\n    { title:\"Unmasking the Exchange Rate Exposure Puzzle: How Segment Reporting Quality Reveals Hidden Risks\",\n      coauthors:[],\n      tldr:\"Segment-reporting quality helps explain the exchange-rate exposure puzzle. Solo-authored.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"Earnings Calls and Echo Chambers: Evidence from the Introduction of Livestreaming on StockTwits\",\n      coauthors:[{name:\"Clifton Green\"},{name:\"Stanimir Markov\"},{name:\"Jeroen Koenraadt\"}],\n      tldr:\"How livestreaming on StockTwits shapes information echo chambers around earnings calls.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"Deleting Information: Content Moderation Regulation and Strategic Information Removal\",\n      coauthors:[{name:\"Ham Christensen\",url:\"https://www.linkedin.com/in/john-hanmer-christensen-3a36961a6/\"},{name:\"Mark Lang\",url:\"https://marklang.web.unc.edu/\"}],\n      tldr:\"How content-moderation regulation drives the strategic removal of information.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] }\n  ];\n\n  pub = [\n    { title:\"Judge Financial Holdings and Case Outcomes: Evidence from Judge Financial Disclosures\", url:\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4265987\",\n      coauthors:[{name:\"Tuhin Harit\",url:\"https://sites.google.com/view/tuhinharit/\",mark:\"++\"},{name:\"Sunil Parupati\",url:\"https://scholar.google.com/citations?user=KLiGME8AAAAJ&hl=en\",mark:\"++\"},{name:\"Gil Sadka\",url:\"https://www.gilsadka.com/\"}],\n      journal:\"Conditionally Accepted, Journal of Accounting and Economics\", status:\"conditionally\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Are judges impartial? Judges' financial holdings predict case outcomes.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"On the Usefulness of Guidance Reports\", url:\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4405292\",\n      coauthors:[{name:\"William Mayew\",url:\"https://sites.duke.edu/mayew/\"},{name:\"Xiaoxi Wu\",url:\"https://sites.google.com/view/xiaoxiwu\",mark:\"+\"}],\n      journal:\"Accepted, Review of Accounting Studies\", badges:[\"FT50\"],\n      tldr:\"New granular data on disclosure — IBES Guidance contains only 15% of all guidance we observe.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"], link:{url:\"https://www.guidance-reports.com/\",label:\"guidance-reports.com\"} },\n    { title:\"Impartial Intelligence? Country Bias in GenAI Financial Analysis\",\n      coauthors:[{name:\"Fabio Motoki\",url:\"https://sites.google.com/view/fmotoki/\",mark:\"*,+\"}],\n      journal:\"Accepted, Journal of Business Ethics\", badges:[\"FT50#\"],\n      tldr:\"GenAI financial analysis shows systematic country bias.\",\n      tags:[\"ML/AI & Text\",\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"Employee Non-Disclosure Agreements and Corporate News\",\n      coauthors:[{name:\"Cameron Holstead\",url:\"https://jindal.utdallas.edu/phd-students/cameron-holstead/\",mark:\"++\"},{name:\"June Huang\",url:\"https://www.junehuangacct.com/\",mark:\"+,*\"}],\n      journal:\"Accepted, Contemporary Accounting Research\", badges:[\"FT50\"],\n      tldr:\"Employees influence firms' information environment.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\",\"ML/AI & Text\"] },\n    { title:\"Beyond Words: The Challenge of Interpreting Financial Text Across Cultures\", url:\"https://link.springer.com/article/10.1057/s41267-025-00798-8\",\n      coauthors:[{name:\"Federico Siano\",url:\"https://federicosiano.com/\",mark:\"+,*\"}],\n      journal:\"Journal of International Business Studies, 2025\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Common US-based NLP approaches falter across international markets.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\",\"ML/AI & Text\"] },\n    { title:\"The Impact of SEC Reporting Changes on Information Acquisition and Market Dynamics: Evidence from Foreign Cross-Listed Firms\", url:\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5336765\",\n      coauthors:[{name:\"Yongtae Kim\",url:\"https://www.scu.edu/business/accounting/faculty/kim/\"},{name:\"Edward Sul\",url:\"https://business.gwu.edu/edward-sul\",mark:\"+\"}],\n      journal:\"Contemporary Accounting Research, 2025\", badges:[\"FT50\"],\n      tldr:\"Disclosure regulation shifts investors' attention across international markets.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"How Does Going Public Affect Employees? Evidence from Glassdoor Reviews\", url:\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5477446\",\n      coauthors:[{name:\"Meng Li\",url:\"https://sites.google.com/view/meng-lis-website/home\",mark:\"+,*\"}],\n      journal:\"Management Science, 2025\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Employees are less satisfied after an IPO; regulatory burden is one reason.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"MiFID II Unbundling and Sell-Side Analyst Research\", url:\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3408198\",\n      coauthors:[{name:\"Mark Lang\",url:\"https://marklang.web.unc.edu/\"},{name:\"Edward Sul\",url:\"https://business.gwu.edu/edward-sul\",mark:\"++\"}],\n      journal:\"Journal of Accounting and Economics, 2024\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Transparent research pricing plus unbundling (MiFID II) led to a brain drain.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"Mandatory Disclosure and Learning from External Market Participants: Evidence from the JOBS Act\", url:\"https://www.sciencedirect.com/science/article/abs/pii/S0165410122000519\",\n      coauthors:[],\n      journal:\"Journal of Accounting and Economics, 2023\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Reduced mandatory disclosure can increase price efficiency.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] },\n    { title:\"The Influence of Short Selling on the Production and Market Consequences of Negative Press Coverage\", url:\"https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2023.4783\",\n      coauthors:[{name:\"Robert Bushman\",url:\"https://www.robertbushman.net/\"}],\n      journal:\"Management Science, 2023\", badges:[\"FT50\",\"UTD24\"],\n      tldr:\"Short sellers shape the content of the business press.\",\n      tags:[\"Disclosure & Information Production\",\"Capital Markets\"] }\n  ];\n\n  other = [\n    { title:\"Regulating Data: Evidence from Corporate America\", url:\"https://onlinelibrary.wiley.com/doi/10.1111/jbfa.12820\",\n      coauthors:[{name:\"Fabio Motoki\",url:\"https://sites.google.com/view/fmotoki/\",mark:\"+,*\"}],\n      journal:\"Journal of Business Finance and Accounting, 2024\" },\n    { title:\"Corporate Events' Performance and Corporate Governance: The Brazilian Evidence\",\n      coauthors:[{name:\"Bruno Funchal\"}],\n      journal:\"Corporate Governance, 2018\" },\n    { title:\"A Influência das Avaliações de Fornecedores na Rescisão de Contratos de Serviços de Exploração e Produção de Petróleo e Gás no Brasil\",\n      coauthors:[{name:\"Danilo Monte-Mor\"},{name:\"Cleison Pinto\"}],\n      journal:\"REPeC, 2016\" }\n  ];\n\n  componentWillMount() {\n    if (this.props.startExpanded) {\n      const open = {};\n      [...this.wp, ...this.wip, ...this.pub].forEach(p => { open[p.title] = true; });\n      this.state = { ...this.state, open };\n    }\n  }\n\n  filterBy(tag) {\n    this.setState(s => ({ activeTag: s.activeTag === tag ? null : tag }));\n  }\n  clearFilter() { this.setState({ activeTag: null }); }\n\n  togglePaper(title) {\n    this.setState(s => ({ open: { ...s.open, [title]: !s.open[title] } }));\n  }\n  expandAll() {\n    const open = {};\n    [...this.wp, ...this.wip, ...this.pub].forEach(p => { open[p.title] = true; });\n    this.setState({ open });\n  }\n  collapseAll() { this.setState({ open: {} }); }\n\n  toggleSection(k) {\n    this.setState(s => ({ collapsed: { ...s.collapsed, [k]: !s.collapsed[k] } }));\n  }\n\n  sep(i, n) {\n    if (i === n - 1) return \"\";\n    if (n === 2 && i === 0) return \" and \";\n    if (i === n - 2) return \", and \";\n    return \", \";\n  }\n\n  badge(b) {\n    const map = {\n      \"FT50\":  { base:\"FT50\",  sub:\"\",  bg:\"#fef3c7\", color:\"#b45309\", border:\"#fde68a\" },\n      \"UTD24\": { base:\"UTD24\", sub:\"\",  bg:\"#fee2e2\", color:\"#7b341e\", border:\"#fecaca\" },\n      \"FT50#\": { base:\"FT50\",  sub:\"#\", bg:\"#fef3c7\", color:\"#b45309\", border:\"#fde68a\" }\n    };\n    return map[b] || { base:b, sub:\"\", bg:\"#f0eeea\", color:\"#5a5750\", border:\"#e8e6e1\" };\n  }\n\n  buildOther(list) {\n    return list.map(p => {\n      const authors = (p.coauthors || []).map((c, i) => ({\n        name: c.name, url: c.url, hasUrl: !!c.url, noUrl: !c.url, mark: c.mark || \"\",\n        sep: this.sep(i, p.coauthors.length)\n      }));\n      return {\n        hasUrl: !!p.url, noUrl: !p.url, url: p.url || \"#\", title: p.title,\n        authorsShow: authors.length > 0, authors, journal: p.journal || \"\"\n      };\n    });\n  }\n\n  buildOne(p, num, isWP) {\n    const active = this.state.activeTag;\n    const open = !!this.state.open[p.title];\n    const stop = (e) => e.stopPropagation();\n    const authors = (p.coauthors || []).map((c, i) => ({\n      name: c.name, url: c.url, hasUrl: !!c.url, noUrl: !c.url, mark: c.mark || \"\",\n      sep: this.sep(i, p.coauthors.length)\n    }));\n    const badges = (p.badges || []).map(b => this.badge(b));\n    const tags = p.tags.map(t => {\n      const on = active === t;\n      return {\n        label: t,\n        onClick: (e) => { e.stopPropagation(); this.filterBy(t); },\n        bg: on ? \"#1a5276\" : \"#f0eeea\",\n        color: on ? \"#fff\" : \"#5a5750\",\n        border: on ? \"#1a5276\" : \"#e8e6e1\"\n      };\n    });\n    return {\n      num: String(num), isWP,\n      pnBg: isWP ? \"#f3f0ff\" : \"#eaf2f8\", pnColor: isWP ? \"#5b21b6\" : \"#1a5276\",\n      hasUrl: !!p.url, noUrl: !p.url, url: p.url || \"#\", title: p.title,\n      authorsShow: authors.length > 0, authors,\n      hasJournal: !!p.journal, journal: p.journal || \"\",\n      journalColor: p.status === \"conditionally\" ? \"#b45309\" : \"#2e7d32\",\n      badges,\n      hasLink: !!p.link, link: p.link || {url:\"#\",label:\"\"},\n      tldr: \" \" + p.tldr, tldrBorder: isWP ? \"#c4b5fd\" : \"#b5d4f4\",\n      tags,\n      detailMax: open ? \"640px\" : \"0px\",\n      chevTransform: open ? \"rotate(180deg)\" : \"rotate(0deg)\",\n      onToggle: () => this.togglePaper(p.title),\n      stop\n    };\n  }\n\n  buildView(list, isWP) {\n    const active = this.state.activeTag;\n    let n = 0;\n    const out = [];\n    list.forEach(p => {\n      if (active && !p.tags.includes(active)) return;\n      n += 1;\n      out.push(this.buildOne(p, n, isWP));\n    });\n    return out;\n  }\n\n  renderVals() {\n    const active = this.state.activeTag;\n    const showWip = this.props.showWorkInProcess ?? true;\n    const showCount = this.props.showFilterCounts ?? true;\n    const all = [...this.wp, ...(showWip ? this.wip : []), ...this.pub];\n\n    const counts = {};\n    all.forEach(p => p.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));\n    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);\n    const themes = sorted.map(([label, count]) => {\n      const on = active === label;\n      return {\n        label, count, showCount,\n        onClick: () => this.filterBy(label),\n        bg: on ? \"#1a5276\" : \"#f0eeea\",\n        color: on ? \"#fff\" : \"#5a5750\",\n        border: on ? \"#1a5276\" : \"#e8e6e1\"\n      };\n    });\n\n    const wpView = this.buildView(this.wp, true);\n    const wipView = showWip ? this.buildView(this.wip, true) : [];\n    const pubView = this.buildView(this.pub, false);\n    const otherView = this.buildOther(this.other);\n\n    const shown = all.filter(p => !active || p.tags.includes(active)).length;\n    const dim = (theme) => (active && active !== theme) ? \"0.32\" : \"1\";\n\n    return {\n      themes,\n      filterActive: !!active,\n      clearFilter: () => this.clearFilter(),\n      resultCount: active ? (\"Showing \" + shown + \" of \" + all.length + \" papers in \\u201c\" + active + \"\\u201d\") : \"\",\n\n      fbDisc: () => this.filterBy(\"Disclosure & Information Production\"),\n      fbMkt: () => this.filterBy(\"Capital Markets\"),\n      fbML: () => this.filterBy(\"ML/AI & Text\"),\n      dimDisc: dim(\"Disclosure & Information Production\"),\n      dimMkt: dim(\"Capital Markets\"),\n      dimML: dim(\"ML/AI & Text\"),\n\n      expandAll: () => this.expandAll(),\n      collapseAll: () => this.collapseAll(),\n\n      wpView, wipView, pubView, otherView,\n      wpVisible: wpView.length > 0,\n      wipVisible: showWip && wipView.length > 0,\n      pubVisible: pubView.length > 0,\n      otherVisible: !active && otherView.length > 0,\n\n      toggleWp: () => this.toggleSection(\"wp\"),\n      toggleWip: () => this.toggleSection(\"wip\"),\n      togglePub: () => this.toggleSection(\"pub\"),\n      wpMax: this.state.collapsed.wp ? \"0px\" : \"4000px\",\n      wipMax: this.state.collapsed.wip ? \"0px\" : \"4000px\",\n      pubMax: this.state.collapsed.pub ? \"0px\" : \"9000px\",\n      wpChev: this.state.collapsed.wp ? \"rotate(-90deg)\" : \"rotate(0deg)\",\n      wipChev: this.state.collapsed.wip ? \"rotate(-90deg)\" : \"rotate(0deg)\",\n      pubChev: this.state.collapsed.pub ? \"rotate(-90deg)\" : \"rotate(0deg)\"\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Jedson Pinto.dc"}
