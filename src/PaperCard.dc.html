<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:#fff;border:1px solid #e8e6e1;border-radius:5px;margin-bottom:.4rem;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;">
  <div onClick="{{ p.onToggle }}" style="display:flex;align-items:flex-start;gap:.65rem;padding:.55rem .85rem;cursor:pointer;">
    <div style="font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:.72rem;background:{{ p.pnBg }};color:{{ p.pnColor }};min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;margin-top:.1rem;">{{ p.num }}</div>
    <div style="flex:1;min-width:0;">
      <sc-if value="{{ p.hasUrl }}" hint-placeholder-val="{{ true }}"><div style="font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:.9rem;color:#2c2a25;line-height:1.35;"><a href="{{ p.url }}" target="_blank" rel="noopener" onClick="{{ p.stop }}" style="color:#2c2a25;text-decoration:none;border-bottom:1px dotted #c5c2bb;">{{ p.title }}</a></div></sc-if>
      <sc-if value="{{ p.noUrl }}" hint-placeholder-val="{{ true }}"><div style="font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:.9rem;color:#2c2a25;line-height:1.35;">{{ p.title }}</div></sc-if>
      <sc-if value="{{ p.authorsShow }}" hint-placeholder-val="{{ true }}"><div style="font-size:.77rem;color:#6b6860;margin-top:.08rem;">with <sc-for list="{{ p.authors }}" as="a" hint-placeholder-count="2"><sc-if value="{{ a.hasUrl }}" hint-placeholder-val="{{ true }}"><a href="{{ a.url }}" target="_blank" rel="noopener" onClick="{{ p.stop }}" style="color:#6b6860;text-decoration:none;border-bottom:1px dotted #c5c2bb;">{{ a.name }}</a></sc-if><sc-if value="{{ a.noUrl }}" hint-placeholder-val="{{ true }}"><span>{{ a.name }}</span></sc-if><sup style="font-size:.62em;color:#9a958c;font-weight:600;">{{ a.mark }}</sup>{{ a.sep }}</sc-for></div></sc-if>
      <sc-if value="{{ p.hasJournal }}" hint-placeholder-val="{{ true }}"><div style="margin-top:.1rem;"><span style="font-size:.75rem;font-weight:500;color:{{ p.journalColor }};">{{ p.journal }}</span> <sc-for list="{{ p.badges }}" as="b" hint-placeholder-count="0"><span style="display:inline-block;font-size:.6rem;font-weight:600;padding:.04rem .3rem;border-radius:3px;margin-left:.14rem;background:{{ b.bg }};color:{{ b.color }};border:1px solid {{ b.border }};">{{ b.base }}<sup style="font-size:.78em;">{{ b.sub }}</sup></span></sc-for></div></sc-if>
    </div>
    <svg viewBox="0 0 24 24" fill="none" stroke="#9a958c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;width:15px;height:15px;margin-top:.25rem;transform:{{ p.chevTransform }};transition:transform .25s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </div>
  <div style="max-height:{{ p.detailMax }};overflow:hidden;transition:max-height .35s ease;">
    <div style="padding:.5rem .85rem .6rem calc(.85rem + 22px + .65rem);border-top:1px solid #e8e6e1;">
      <sc-if value="{{ p.hasLink }}" hint-placeholder-val="{{ true }}"><div style="margin-bottom:.4rem;"><a href="{{ p.link.url }}" target="_blank" rel="noopener" onClick="{{ p.stop }}" style="font-size:.78rem;color:#1a5276;text-decoration:none;border-bottom:1px solid transparent;">{{ p.link.label }} ↗</a></div></sc-if>
      <div style="font-size:.81rem;color:#2c2a25;line-height:1.45;background:#f6f9fc;padding:.4rem .65rem;border-radius:4px;border-left:2.5px solid {{ p.tldrBorder }};"><strong style="font-weight:700;color:#1a5276;font-size:.64rem;letter-spacing:.04em;margin-right:.25rem;">TL;DR</strong>{{ p.tldr }}</div>
      <div style="display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.45rem;"><sc-for list="{{ p.tags }}" as="t" hint-placeholder-count="2"><span onClick="{{ t.onClick }}" style="font-size:.66rem;font-weight:500;padding:.1rem .42rem;border-radius:20px;cursor:pointer;user-select:none;background:{{ t.bg }};color:{{ t.color }};border:1px solid {{ t.border }};">{{ t.label }}</span></sc-for></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:120},&quot;p&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
