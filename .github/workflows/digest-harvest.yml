name: Digest harvest (daily)

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digest-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q -r digest/requirements.txt

      - name: Harvest, enrich, prepare
        id: harvest
        run: |
          set -euo pipefail
          cd digest
          RUN_DATE=$(date -u +%F)
          EDITION=$(python3 -c "import json,os;print(json.load(open('data/last-run.json'))['edition']+1 if os.path.exists('data/last-run.json') else 1)")
          RUN_DIR=$(printf "data/runs/edition-%03d" "$EDITION")
          echo "Edition $EDITION on $RUN_DATE"
          if [ -f "$RUN_DIR/enriched.json" ] && [ ! -f "$RUN_DIR/classified.json" ]; then
            echo "Edition $EDITION already harvested and awaiting classification. Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/harvest.py --edition "$EDITION" --date "$RUN_DATE"
          KEPT=$(python3 -c "import json;print(len(json.load(open('$RUN_DIR/harvested.json'))))" 2>/dev/null || echo 0)
          if [ "$KEPT" = "0" ]; then
            echo "No relevant papers in this window. Skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/enrich.py --edition "$EDITION"
          python3 scripts/classify.py prepare --edition "$EDITION" --batch-size 8
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit raw edition
        if: steps.harvest.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "digest-harvest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digest/data/runs
          if git diff --cached --quiet; then
            echo "Nothing staged."
          else
            git commit -m "Digest: harvest raw edition (awaiting classification)"
            git pull --rebase origin main
            git push origin main
          fi
