name: Expose digest artifact (transit)

# Download a harvest artifact (unreachable on Azure blob from the sandbox)
# and drop it onto a throwaway `digest-raw` branch a Claude session can read
# via the GitHub API. Holds abstracts transiently; delete after classifying.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Harvest run id whose artifact to expose"
        required: true
      artifact:
        description: "Artifact name"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  expose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download harvest artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ inputs.run_id }}" --repo "${{ github.repository }}" -n "${{ inputs.artifact }}" -D _raw
          find _raw -type f | sort | head
      - name: Publish to digest-raw branch
        run: |
          set -euo pipefail
          git config user.name "digest-bot"
          git config user.email "noreply@anthropic.com"
          git checkout --orphan digest-raw
          git reset -q
          git add -f _raw
          git commit -q -m "Transit batches for ${{ inputs.artifact }} (abstracts; do not merge; delete after classify)"
          git push -f origin digest-raw
