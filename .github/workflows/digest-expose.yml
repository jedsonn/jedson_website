name: Expose digest artifact (transit)

# One-shot helper: download a harvest artifact (which the sandbox's proxy
# cannot reach on Azure blob storage) and drop it onto a throwaway
# `digest-raw` branch so a Claude session can read the batches via the GitHub
# API. The branch holds abstracts transiently and must be deleted after the
# edition is classified. Never merge digest-raw into main.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Harvest run id whose artifact to expose"
        required: true
      artifact:
        description: "Artifact name"
        required: true
        default: "digest-edition-2"

permissions:
  contents: write
  actions: read

jobs:
  expose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download harvest artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ inputs.run_id }}" --repo "${{ github.repository }}" -n "${{ inputs.artifact }}" -D _raw
          echo "Downloaded:"; find _raw -type f | sort

      - name: Publish batches to digest-raw branch
        run: |
          set -euo pipefail
          git config user.name "digest-bot"
          git config user.email "noreply@anthropic.com"
          git checkout --orphan digest-raw
          git reset -q
          git add -f _raw
          git commit -q -m "Transit batches for ${{ inputs.artifact }} (abstracts; do not merge; delete after classify)"
          git push -f origin digest-raw
          echo "Pushed _raw to digest-raw."
